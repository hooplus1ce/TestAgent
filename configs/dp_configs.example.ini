# Copy this file to configs/dp_configs.ini for local browser settings.
# The real dp_configs.ini is machine-local and ignored by git.
#
# --user-data-dir is resolved from the MCP process cwd, normally the project
# root. The recommended local profile path is ./dp_profile, which is ignored.

[paths]
download_path = .
tmp_path =

[chromium_options]
address = 127.0.0.1:9222
browser_path = chrome
arguments = ['--disable-site-isolation-trials', '--test-type', '--no-default-browser-check', '--disable-suggestions-ui', '--no-first-run', '--disable-infobars', '--disable-popup-blocking', '--hide-crash-restore-bubble', '--disable-session-crashed-bubble', '--disable-restore-session-state', '--disable-features=PrivacySandboxSettings4', '--start-maximized', '--user-data-dir=dp_profile']
prefs = {'profile.default_content_settings.popups': 0, 'profile.default_content_setting_values': {'notifications': 2}, 'credentials_enable_service': False, 'profile.password_manager_enabled': False, 'profile.exit_type': 'Normal', 'session.restore_on_startup': 0, 'profile.exited_cleanly': True}
flags = {}
load_mode = normal
user = Default
auto_port = False
system_user_path = False
existing_only = False
new_env = False

[session_options]
headers = {'user-agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome Safari/537.36', 'accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8', 'connection': 'keep-alive'}

[timeouts]
base = 10
page_load = 30
script = 30

[proxies]
http =
https =

[others]
retry_times = 3
retry_interval = 2
