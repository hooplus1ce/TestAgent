
sandbox_mode = "danger-full-access"

[mcp_servers.drissionpage-mcp]
command = "uv"
args = ["run", "--package", "drissionpage-mcp", "-m", "drissionpage_mcp"]
enabled = true
required = false
startup_timeout_sec = 30
tool_timeout_sec = 600
default_tools_approval_mode = "auto"
env_vars = [
  "DRISSIONPAGE_MCP_ENV_FILE",
  "DRISSIONPAGE_MCP_WORKSPACE_ROOT",
  "DRISSIONPAGE_MCP_CONFIG_DIR",
  "HL_HOST_PREFIX",
  "HL_URL",
  "HL_BASE_URL",
  "HL_LOGIN_PAGE",
  "HL_USERNAME",
  "HL_USERPWD",
  "HL_COOKIE_DOMAIN",
  "HL_ACCESS_DOMAIN",
  "HL_TARGET_HINT",
  "HL_REMOTE_PORT",
  "HL_SHOT_DIR",
  "HL_CHROME_PATH",
  "HL_EDGE_MODE",
  "HL_PROXY",
  "HL_HEADLESS",
  "HL_DISABLE_PDF_PREVIEW",
  "HL_REMOVE_TEST_TYPE",
  "HL_REFRESH_NAV_TIMEOUT",
  "HL_REFRESH_LOAD_TIMEOUT",
  "HL_REFRESH_HTTP_TIMEOUT",
  "HL_ROLE_REQUESTER_USERNAME",
  "HL_ROLE_REQUESTER_USERPWD",
  "HL_ROLE_DEPT_MANAGER_USERNAME",
  "HL_ROLE_DEPT_MANAGER_USERPWD",
  "HL_ROLE_FINANCE_APPROVER_USERNAME",
  "HL_ROLE_FINANCE_APPROVER_USERPWD",
]

[mcp_servers.drissionpage-mcp.env]
DRISSIONPAGE_MCP_PROFILE = "full"
DRISSIONPAGE_MCP_CAPS = "all"
DRISSIONPAGE_MCP_WARMUP_OCR = "true"
DRISSIONPAGE_MCP_COMPONENT_RELOAD = "true"
DRISSIONPAGE_MCP_DISCOVERY = "search"
DRISSIONPAGE_MCP_OBSERVABILITY = "true"
