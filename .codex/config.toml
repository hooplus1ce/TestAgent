
sandbox_mode = "danger-full-access"

[mcp_servers.drissionpage-mcp]
command = "uv"
args = ["run", "--project", "mcp-service", "python", "mcp-service/launcher.py"]
cwd = "."
enabled = true
required = false
startup_timeout_sec = 30
tool_timeout_sec = 120
default_tools_approval_mode = "auto"
env_vars = [
  "HL_SCM_URL",
  "HL_SCM_BASE_URL",
  "HL_SCM_LOGIN_PAGE",
  "HL_SCM_USERNAME",
  "HL_SCM_USERPWD",
  "HL_COOKIE_DOMAIN",
  "HL_ACCESS_DOMAIN",
  "HL_TARGET_HINT",
  "HL_REMOTE_PORT",
  "HL_SHOT_DIR",
  "HL_CHROME_PATH",
  "HL_EDGE_MODE",
  "HL_PROXY",
  "HL_HEADLESS",
  "HL_DISABLE_PDF_PREVIEW",
  "HL_REMOVE_TEST_TYPE",
  "HL_REFRESH_NAV_TIMEOUT",
  "HL_REFRESH_LOAD_TIMEOUT",
  "HL_REFRESH_HTTP_TIMEOUT",
  "HL_SCM_ROLE_REQUESTER_USERNAME",
  "HL_SCM_ROLE_REQUESTER_USERPWD",
  "HL_SCM_ROLE_DEPT_MANAGER_USERNAME",
  "HL_SCM_ROLE_DEPT_MANAGER_USERPWD",
  "HL_SCM_ROLE_FINANCE_APPROVER_USERNAME",
  "HL_SCM_ROLE_FINANCE_APPROVER_USERPWD",
]

[mcp_servers.drissionpage-mcp.env]
DRISSIONPAGE_MCP_PROFILE = "full"
DRISSIONPAGE_MCP_CAPS = "all"
