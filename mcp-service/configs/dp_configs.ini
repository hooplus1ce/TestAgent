# 路径说明：本 ini 位于 mcp-service/configs/；包入口或 launcher 会把 cwd 固定为 mcp-service/
# ../dp_profile 即项目根目录下复用的 Chrome 用户数据目录（几百 MB，已 gitignore）
[paths]
download_path = .
tmp_path =

[chromium_options]
address = 127.0.0.1:9222
browser_path = chrome
arguments = ['--disable-site-isolation-trials', '--test-type', '--no-default-browser-check', '--disable-suggestions-ui', '--no-first-run', '--disable-infobars', '--disable-popup-blocking', '--hide-crash-restore-bubble', '--disable-session-crashed-bubble', '--disable-restore-session-state', '--disable-features=PrivacySandboxSettings4', '--start-maximized', '--user-data-dir=../dp_profile']
prefs = {'profile.default_content_settings.popups': 0, 'profile.default_content_setting_values': {'notifications': 2}, 'credentials_enable_service': False, 'profile.password_manager_enabled': False, 'profile.exit_type': 'Normal', 'session.restore_on_startup': 0, 'profile.exited_cleanly': True}
flags = {}
load_mode = normal
user = Default
auto_port = False
system_user_path = False
existing_only = False
new_env = False

[session_options]
headers = {'user-agent': 'Mozilla/5.0 (Macintosh; Intel Mac OS X 10_12_6) AppleWebKit/603.3.8 (KHTML, like Gecko) Version/10.1.2 Safari/603.3.8', 'accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8', 'connection': 'keep-alive', 'accept-charset': 'GB2312,utf-8;q=0.7,*;q=0.7'}

[timeouts]
base = 10
page_load = 30
script = 30

[proxies]
http =
https =

[others]
retry_times = 3
retry_interval = 2
